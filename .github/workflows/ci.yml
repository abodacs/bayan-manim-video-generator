name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Manim native dependencies (cairo / pango / ffmpeg)
        # Manim -> pycairo/manimpango build against Cairo and Pango headers, and
        # rendering needs ffmpeg. Without these `uv sync` fails (see README).
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libpango1.0-dev \
            libpangocairo-1.0-0 \
            ffmpeg

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy type-check
        run: uv run mypy bayan

      - name: Pytest with coverage
        run: uv run pytest

  container-smoke:
    name: Containerized Arabic smoke render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build and run the isolated Arabic smoke render
        run: python3 scripts/container_smoke.py --output artifacts/container-smoke

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-smoke
          path: artifacts/container-smoke/
          if-no-files-found: warn
