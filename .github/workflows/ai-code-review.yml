name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

# Cancel an in-flight review when a new commit is pushed to the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ai-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 100

      - name: Fetch main branch
        run: git fetch origin main --depth=100

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run AI Review
        env:
          ANTHROPIC_BASE_URL: https://api.z.ai/api/anthropic
          ANTHROPIC_API_KEY: ${{ secrets.AI_CODE_REVIEW_ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: glm-5.2
        run: |
          claude -p "$(cat .claude/commands/code-review.md)" \
            --output-format json \
            --max-turns 30 \
            --model "$CLAUDE_MODEL" \
            --allowedTools "Read,Grep,Glob,Bash(git diff *),Bash(git log *),Bash(git show *),Bash(git merge-base *),Agent" \
            | jq -r '.result // "Review produced no output"' > ai-review-output.txt

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file ai-review-output.txt
