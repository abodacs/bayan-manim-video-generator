# Pre-commit hooks for the Python project.
# Run `pre-commit run --all-files` to check manually.
# Install both stages with:
#   uv run pre-commit install
#   uv run pre-commit install --hook-type pre-push
repos:
  # General repository hygiene.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: debug-statements

  # Fast Python checks on every commit.
  - repo: local
    hooks:
      - id: english-python-comments
        name: Check Python comments are in English
        entry: python scripts/check_python_comments.py
        language: system
        files: \.py$
        types: [python]

      - id: ruff-check
        name: Ruff lint
        entry: uv run ruff check --fix --exit-non-zero-on-fix
        language: system
        files: \.py$
        types: [python]
        require_serial: true

      - id: ruff-format
        name: Ruff format
        entry: uv run ruff format --check
        language: system
        files: \.py$
        types: [python]
        require_serial: true

  # Heavier Python checks before pushing a branch.
  - repo: local
    hooks:
      - id: mypy
        name: Mypy type check
        entry: uv run mypy bayan
        language: system
        files: '^(bayan|tests|scripts)/|^(pyproject\.toml|uv\.lock)$'
        pass_filenames: false
        require_serial: true
        stages: [pre-push]

      - id: pytest
        name: Python tests
        entry: uv run pytest -q
        language: system
        files: '^(bayan|tests|scripts)/|^(pyproject\.toml|uv\.lock)$'
        pass_filenames: false
        require_serial: true
        stages: [pre-push]
